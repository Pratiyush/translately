name: Feature request
description: Propose a new capability or enhancement
title: "[feat] "
labels: ["type:feat"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature. The scope of v1.0.0 is defined by [tasks.md](../../tasks.md) and the approved plan; large new scope needs discussion.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? Whose pain is this?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Your favourite solution. API shape, UI change, etc.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What else did you look at? Why is this better?

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      multiple: false
      options: [backend, webapp, sdk-js, cli, infra, docs]
    validations:
      required: true

  - type: dropdown
    id: phase
    attributes:
      label: Target phase
      multiple: false
      options:
        - "Phase 0 — Bootstrap"
        - "Phase 1 — Auth + Org/Project"
        - "Phase 2 — Keys + Translations + ICU"
        - "Phase 3 — JSON import/export"
        - "Phase 4 — AI/MT (BYOK) + TM"
        - "Phase 5 — Screenshots + JS SDK"
        - "Phase 6 — Webhooks + CDN + CLI"
        - "Phase 7 — Tasks + Branching + SSO/LDAP + Audit"
        - "Post v1.0"
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Who benefits and how much?
      description: Rough estimate of user segment size and expected impact.

  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues and no duplicate exists.
          required: true
        - label: This does not require a platform-owned AI key (must be BYOK if AI-related).
          required: true
