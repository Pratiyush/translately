name: Bug report
description: Something isn't working as expected
title: "[bug] "
labels: ["type:fix"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill in every section so we can reproduce and triage quickly.

        Security-sensitive bugs go to <https://github.com/Pratiyush/translately/security/advisories/new> or pratiyush1@gmail.com — **not** here.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear, concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps. Include request/response payloads where relevant.
      placeholder: |
        1. Start `docker compose up -d`
        2. Open http://localhost:5173
        3. Click …
        4. See error …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Translately version
      description: Tag / commit SHA / release name.
      placeholder: "v0.1.0 or 4f3a2b1"
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      multiple: false
      options: [backend, webapp, sdk-js, cli, infra, docs]
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser, JVM, Docker version, anything else.
      placeholder: |
        - OS: macOS 14.6
        - Browser: Firefox 131
        - JVM: Temurin 21.0.3
        - Docker: 27.0.3

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / screenshots
      description: Paste text logs in a code fence. Attach screenshots inline.
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues and no duplicate exists.
          required: true
        - label: I can reproduce this on the latest release.
          required: true
