# Jekyll config for the Translately GitHub Pages site.
# Built by .github/workflows/pages.yml on every push to master.

title: Translately
tagline: Open-source localization & translation management
description: >-
  Self-hosted, MIT-licensed localization platform. Translation keys,
  translations, ICU validation, i18next JSON import/export shipping in v0.3.0.
  Quarkus + Kotlin backend, React + Vite webapp, PostgreSQL + Redis + MinIO.
  Bring-your-own-key AI lands in v0.4.0 — the platform runs end-to-end without
  it. Every feature (SSO, SAML, LDAP, Tasks, Branching, Webhooks, CDN,
  glossaries, audit) ships free.

url: https://pratiyush.github.io
baseurl: /translately

# Hosted theme — just-the-docs is the standard for dev-focused project docs.
remote_theme: just-the-docs/just-the-docs@v0.10.0

# ---- theme options ---------------------------------------------------------
# Dark palette by default. just-the-docs ships a light + dark pair; we pick
# dark to match developer-docs muscle memory (Stripe Docs, Cloudflare Docs,
# Tailwind Docs all default dark). A per-user toggle lands with the Phase 5
# webapp-in-docs integration. Visitors who prefer light can pass
# `?color_scheme=light` in the URL for a session-scoped override (handled
# client-side by just-the-docs' toggle script).
color_scheme: dark
heading_anchors: true
search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s\-/]+/
  rel_url: true
  button: true

# Top-right aux links.
aux_links:
  GitHub:
    - https://github.com/Pratiyush/translately
  Changelog:
    - https://github.com/Pratiyush/translately/blob/master/CHANGELOG.md
  Download docs (ZIP):
    - /translately/downloads/translately-docs.zip
  LLM corpus:
    - /translately/llms-full.txt

aux_links_new_tab: true

# Footer
footer_content: >-
  © 2026 Pratiyush · MIT License ·
  <a href="https://github.com/Pratiyush/translately">github.com/Pratiyush/translately</a>
  · <a href="/translately/downloads/translately-docs.zip">Download full docs</a>
  · <a href="/translately/llms-full.txt">LLM-ingestible corpus</a>

# GitHub-backed actions (edit this page / open issue)
gh_edit_link: true
gh_edit_link_text: Edit this page on GitHub
gh_edit_repository: https://github.com/Pratiyush/translately
gh_edit_branch: master
gh_edit_source: docs
gh_edit_view_mode: edit

# ---- Jekyll build options --------------------------------------------------
markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

permalink: pretty

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-relative-links
  - jekyll-readme-index

relative_links:
  enabled: true
  collections: false

readme_index:
  enabled: true
  remove_originals: false
  with_frontmatter: true

# Exclude from the Jekyll build.
# NOTE: Files listed here are dropped from _site entirely. Do NOT list files
# the site needs to serve (e.g. downloads/translately-docs.zip, llms.txt,
# llms-full.txt) — Jekyll copies unknown file types through by default.
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - node_modules/
  - README.md # repo-facing; docs/index.md is the site root

# Default layout for any page without an explicit one.
defaults:
  - scope:
      path: ""
    values:
      layout: default
