<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Verify your Translately email</title>
  </head>
  <body style="font-family: -apple-system, Segoe UI, Arial, sans-serif; color: #111; max-width: 600px; margin: 0 auto; padding: 24px;">
    <h1 style="font-size: 20px; margin-bottom: 16px;">Welcome, {fullName}.</h1>
    <p>Thanks for creating a Translately account. To finish setting things up, please confirm this is your email.</p>
    <p style="margin: 24px 0;">
      <a href="{link}"
         style="background: #111; color: #fff; padding: 12px 20px; text-decoration: none; border-radius: 6px; display: inline-block;">
        Verify email
      </a>
    </p>
    <p style="font-size: 13px; color: #666;">
      If the button doesn't work, copy and paste this link into your browser:<br />
      <a href="{link}">{link}</a>
    </p>
    <p style="font-size: 13px; color: #666;">
      If you didn't sign up for Translately, you can safely ignore this message.
    </p>
  </body>
</html>
