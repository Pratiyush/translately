# Translately backend runtime config.
# Profiles: default, %dev, %test, %prod.
# Secrets come from env vars in production — never commit real credentials.

# ---- Translately app config ---------------------------------------------
#
# Master key (KEK) for envelope-encrypting per-project secrets (AI API keys,
# later PATs if we ever store plaintext). Must decode to 32 bytes.
#
# DEV/TEST default below is a fixed zero-byte-derived value. It is NOT a
# secret and MUST NOT be used in production — the %prod profile requires
# TRANSLATELY_CRYPTO_MASTER_KEY to be set in the environment.
#
# Generate a real key with:
#   openssl rand -base64 32
translately:
  crypto:
    # 32 bytes: 0x00..0x1F — clearly a dev placeholder, not a secret.
    master-key: AAECAwQFBgcICQoLDA0ODxAREhMUFRYXGBkaGxwdHh8=
  jwt:
    issuer: translately
    audience: translately-webapp
    access-ttl: PT15M
    refresh-ttl: P30D

# ---- Smallrye JWT (signing + verifying bearer tokens) ---------------------
# DEV/TEST keypair is committed at classpath:/jwt-dev/. NOT a secret.
# %prod overrides these with operator-supplied paths.
mp:
  jwt:
    verify:
      publickey:
        location: classpath:/jwt-dev/public.pem
      issuer: translately
      audiences: translately-webapp
  # MicroProfile OpenAPI scan config. Restrict scanning to the production API
  # package so test-classpath probe resources (tenant, jwt, scope probes in
  # `io.translately.app.*`) can never leak into the committed
  # `docs/api/openapi.json` during a test-mode Quarkus boot.
  openapi:
    scan:
      packages: io.translately.api
smallrye:
  jwt:
    sign:
      key:
        location: classpath:/jwt-dev/private.pem
    new-token:
      issuer: translately
      audience: translately-webapp


quarkus:
  application:
    name: translately
    version: ${translately.version:0.0.1-SNAPSHOT}

  http:
    port: 8080
    host: 0.0.0.0
    # Parse the Authorization header on every request so JsonWebToken is
    # populated for our JwtSecurityScopesFilter even when the endpoint lacks
    # MicroProfile security annotations. Authorization decisions live in
    # @RequiresScope, not @RolesAllowed.
    auth:
      proactive: true
    cors:
      ~: true
      origins: http://localhost:5173,http://127.0.0.1:5173
      methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
      headers: Authorization,Content-Type,X-Requested-With,X-Translately-Idempotency-Key
      exposed-headers: Location,X-RateLimit-Limit,X-RateLimit-Remaining,X-RateLimit-Reset

  smallrye-openapi:
    info-title: Translately API
    info-version: ${translately.version:0.0.1-SNAPSHOT}
    info-description: Open-source self-hosted localization and translation management API.
    info-license-name: MIT
    info-license-url: https://opensource.org/licenses/MIT
    info-contact-name: Pratiyush
    info-contact-url: https://github.com/Pratiyush/translately
    # Generate a static schema file alongside the build.
    # Path is relative to the :backend:app module root, so ../../docs/api/
    # resolves to <repo-root>/docs/api/ — committed and served by Pages.
    # A Gradle task (generateOpenApi) copies + canonicalises the output.
    store-schema-directory: build/openapi
    store-schema-file-name: openapi

  swagger-ui:
    always-include: true
    path: /q/swagger-ui

  log:
    level: INFO
    category:
      "io.translately":
        level: INFO
    console:
      json: true

  # Datasource / JPA / Flyway are on the classpath via the :backend:data module.
  # The default block ships `active: false` so the classpath stays inert for
  # tooling-only tasks (e.g. `./gradlew :backend:app:quarkusGenerateCode`,
  # schema-only smoke probes) that don't want a database on the other end.
  # Every runtime profile (%dev, %test, %prod) overrides these to `true` so
  # real use always boots against Postgres — see the per-profile blocks below.
  datasource:
    db-kind: postgresql
    devservices:
      enabled: false
  hibernate-orm:
    active: false
  flyway:
    active: false

  # LDAP is a Phase 7 feature; the extension is on the classpath (via :backend:security)
  # and its config is validated at runtime so we provide inert placeholder values.
  # Real LDAP wiring ships when Phase 7 (v1.0.0) lands.
  security:
    ldap:
      dir-context:
        url: ldap://localhost:389
      identity-mapping:
        search-base-dn: ou=users,dc=example,dc=com

  # Quarkus OIDC lives on the classpath via :backend:security for Phase 7
  # (Keycloak + SAML). Disabled by default so smallrye-jwt cleanly owns
  # JsonWebToken production; the %oidc profile (T107) enables it later.
  oidc:
    enabled: false

# -----------------------------------------------------------------------------
"%dev":
  quarkus:
    log:
      category:
        "io.translately":
          level: DEBUG
    # Re-enable the JPA + migrations layer that the Phase 0 default
    # block turned off. Every phase since v0.1.0 ships real entities +
    # Flyway migrations, so quarkusDev needs both active.
    hibernate-orm:
      active: true
    flyway:
      active: true
      migrate-at-start: true
    datasource:
      # docker compose up -d brings this up at localhost:5432
      username: translately
      password: translately
      jdbc:
        url: jdbc:postgresql://localhost:5432/translately

# -----------------------------------------------------------------------------
"%test":
  quarkus:
    # Phase 0 tests don't require any dev-services. Tests that do (e.g. Postgres
    # Testcontainers in Phase 1+) enable them explicitly via @QuarkusTestResource.
    devservices:
      enabled: false
    datasource:
      devservices:
        enabled: false
    s3:
      devservices:
        enabled: false
    keycloak:
      devservices:
        enabled: false

# -----------------------------------------------------------------------------
"%prod":
  # Prod MUST provide real keys. Missing env vars → app fails to start
  # (Quarkus config resolution throws on unresolved expressions rather than
  # silently reusing dev placeholders).
  translately:
    crypto:
      master-key: ${TRANSLATELY_CRYPTO_MASTER_KEY}
  mp:
    jwt:
      verify:
        publickey:
          location: ${TRANSLATELY_JWT_PUBLIC_KEY_PATH}
  smallrye:
    jwt:
      sign:
        key:
          location: ${TRANSLATELY_JWT_PRIVATE_KEY_PATH}
  quarkus:
    log:
      level: INFO
    # Re-enable the JPA + migrations layer that the Phase 0 default
    # block turned off. Production deploys rely on Flyway to apply
    # V1..V4 (and future migrations) at boot so a fresh Postgres lands
    # at a consistent schema.
    hibernate-orm:
      active: true
    flyway:
      active: true
      migrate-at-start: true
    datasource:
      username: ${QUARKUS_DATASOURCE_USERNAME}
      password: ${QUARKUS_DATASOURCE_PASSWORD}
      jdbc:
        url: ${QUARKUS_DATASOURCE_JDBC_URL}
